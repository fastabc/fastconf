name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Root module — build, test (race), budget guards
  # -----------------------------------------------------------------------
  test:
    name: test / go ${{ matrix.go }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22.x", "1.26.x"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Build
        run: go build ./...

      - name: Test (race)
        run: go test -race -count=1 -timeout=5m ./...

      - name: BenchmarkGet guard
        if: matrix.go == '1.26.x'
        run: bash tools/bench-guard.sh

      - name: LOC budget – main package
        run: bash tools/loc-budget.sh

      - name: LOC budget – full tree
        run: bash tools/total-loc-budget.sh

  # -----------------------------------------------------------------------
  # Independent modules (have their own go.mod)
  # -----------------------------------------------------------------------
  test-submodules:
    name: test / ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - cue
          - integrations/cli/pflag
          - integrations/log/phuslu
          - integrations/log/zerolog
          - observability/metrics/prometheus
          - observability/otel
          - policy/opa
          - providers/s3
          - validate/playground
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Test ${{ matrix.module }} (race)
        working-directory: ${{ matrix.module }}
        run: go test -race -count=1 -timeout=3m ./...

  # -----------------------------------------------------------------------
  # Lint (golangci-lint) — root module only (sub-modules share the same rules)
  # -----------------------------------------------------------------------
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m ./...

      - name: Inter-package dependency whitelist
        run: bash tools/check-deps.sh

      - name: Layout guard
        run: bash tools/check-layout.sh

      - name: Module matrix guard
        run: bash tools/check-module-matrix.sh

      - name: API snapshot guard
        run: bash tools/check-api-snapshot.sh

      - name: Documentation symbol guard
        run: bash tools/check-doc-symbols.sh

      - name: CJK-in-non-test guard
        run: bash tools/check-cjk-comments.sh

  # -----------------------------------------------------------------------
  # Phase-comment audit guard (zero stale phase comments allowed)
  # -----------------------------------------------------------------------
  audit:
    name: audit / phase comments
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit phase comments
        run: bash tools/audit-phase-comments.sh --strict
